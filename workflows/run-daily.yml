name: Workday Twice Daily Auto Run

on:
  schedule:
    # 每个工作日（周一至周五）早上 01:35 UTC（= 北京时间 09:35）
    - cron: '35 1 * * 1-5'
    # 每个工作日（周一至周五）早上 07:01 UTC（= 北京时间 15:01）
    - cron: '1 7 * * 1-5'

  workflow_dispatch:  # 手动触发按钮（可选）

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install pandas requests openpyxl

    - name: Run daat.py
      run: python daat.py

    - name: Run push.py
      run: python push.py
